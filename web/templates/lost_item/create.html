{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_create.html" . }}
                    <form method="POST" action="/lost-items/create">
                        <div class="mb-3">
                            <label for="item_name" class="form-label">Nama Barang *</label>
                            <input type="text" class="form-control" id="item_name" name="item_name" required placeholder="Misal: Mouse Wireless Logitech, Flashdisk 32GB, ...">
                        </div>

                        <div class="mb-3">
                            <label for="item_description" class="form-label">Deskripsi Barang</label>
                            <textarea class="form-control" id="item_description" name="item_description" rows="3" placeholder="Warna, merk, ciri-ciri khusus, ..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="reported_by" class="form-label">Nama Pelapor *</label>
                            <input type="text" class="form-control" id="reported_by" name="reported_by" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="reported_date" class="form-label">Tanggal Lapor</label>
                                <input type="date" class="form-control" id="reported_date" name="reported_date" data-default-date>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="last_seen_at" class="form-label">Terakhir Terlihat</label>
                                <input type="datetime-local" class="form-control" id="last_seen_at" name="last_seen_at">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="hilang">Hilang</option>
                                <option value="dilaporkan">Dilaporkan</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="location_last_seen" class="form-label">Lokasi Terakhir Dilihat</label>
                            <input type="text" class="form-control" id="location_last_seen" name="location_last_seen" placeholder="Misal: Meja PC-01, di bawah meja PC-07, ...">
                        </div>

                        <hr>
                        <h6 class="text-muted"><i class="bi bi-camera"></i> Foto Barang</h6>

                        <div class="mb-3">
                            <input type="hidden" id="photo" name="photo" value="">
                            <p class="text-muted mb-3">Max 5MB, format JPEG/PNG/HEIC</p>

                            <div class="row g-3">
                                <div class="col-6 d-flex flex-column">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="bi bi-camera-fill text-primary me-2"></i>
                                        <label class="form-label mb-0 small fw-medium">Ambil Foto Langsung</label>
                                    </div>
                                    <input type="file" id="photoCamera" accept="image/*" capture="environment" class="form-control mt-auto">
                                </div>
                                <div class="col-6 d-flex flex-column">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="bi bi-images text-secondary me-2"></i>
                                        <label class="form-label mb-0 small fw-medium">Pilih dari Galeri</label>
                                    </div>
                                    <input type="file" id="photoGallery" accept="image/jpeg,image/png,image/heic,image/heif" class="form-control mt-auto">
                                </div>
                            </div>

                            <div id="photoPreviewWrapper" class="mt-3 d-none">
                                <div class="border rounded-3 p-3 bg-light text-center">
                                    <img id="photoPreview" src="" alt="Preview" class="img-fluid rounded" style="max-height: 200px; object-fit: contain;">
                                    <div id="loadingLostItem" class="d-none mt-2">
                                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                        <small class="text-muted ms-1">Memproses gambar...</small>
                                    </div>
                                    <div id="errorLostItem" class="d-none mt-2 text-danger small"></div>
                                    <div class="mt-3 text-center">
                                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearLostItemPhoto()">
                                            <i class="bi bi-x-circle me-1"></i> Hapus
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="/lost-items" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

<script>
window.ANDROID_MODE = {{ .android }};
</script>
{{ if .android }}
<script src="/static/vendor/heic-to.js"></script>
{{ end }}
<script>
async function heicToJpeg(file) {
    var ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'heic' && ext !== 'heif') return file;
    if (typeof HeicTo === 'undefined') return file;
    try {
        var blob = await HeicTo({ blob: file, type: 'image/jpeg', quality: 0.88 });
        return new File([blob], file.name.replace(/\.(heic|heif)$/i, '.jpg'), { type: 'image/jpeg', lastModified: Date.now() });
    } catch (e) { console.warn('HEIC conversion failed:', e); return file; }
}

async function compressImage(file, maxDimension, quality) {
    return new Promise(function (resolve, reject) {
        var img = new Image();
        img.onload = function () {
            var width = img.width;
            var height = img.height;
            if (width > maxDimension || height > maxDimension) {
                var ratio = Math.min(maxDimension / width, maxDimension / height);
                width = Math.round(width * ratio);
                height = Math.round(height * ratio);
            }
            var canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(function (blob) {
                if (!blob) { reject(new Error('Gagal kompresi gambar')); return; }
                var fileName = file.name.replace(/\.[^.]+$/, '.jpg');
                resolve(new File([blob], fileName, { type: 'image/jpeg', lastModified: Date.now() }));
            }, 'image/jpeg', quality);
        };
        img.onerror = function () { reject(new Error('Gagal memuat gambar')); };
        img.src = URL.createObjectURL(file);
    });
}

var lostItemPreviewUrl = null;

document.getElementById('photoCamera').addEventListener('change', function() { handleLostItemPhotoUpload(this); });
document.getElementById('photoGallery').addEventListener('change', function() { handleLostItemPhotoUpload(this); });

async function handleLostItemPhotoUpload(input) {
    var file = input.files[0];
    if (!file) return;

    document.getElementById('loadingLostItem').classList.remove('d-none');
    document.getElementById('errorLostItem').classList.add('d-none');

    try {
        file = await heicToJpeg(file);

        if (window.ANDROID_MODE) {
            file = await compressImage(file, 1280, 0.75);
        }

        if (lostItemPreviewUrl) URL.revokeObjectURL(lostItemPreviewUrl);
        lostItemPreviewUrl = URL.createObjectURL(file);
        document.getElementById('photoPreview').src = lostItemPreviewUrl;
        document.getElementById('photoPreviewWrapper').classList.remove('d-none');
        document.getElementById('loadingLostItem').classList.add('d-none');

        var formData = new FormData();
        formData.append('image', file);
        formData.append('type', 'lost_item');

        var resp = await fetch('/api/upload-image', { method: 'POST', body: formData });
        var data = await resp.json();
        if (data.success) {
            document.getElementById('photo').value = data.file_ref;
        }
    } catch (e) {
        document.getElementById('loadingLostItem').classList.add('d-none');
        document.getElementById('errorLostItem').textContent = 'Gagal memproses gambar';
        document.getElementById('errorLostItem').classList.remove('d-none');
    }
}

function clearLostItemPhoto() {
    var ref = document.getElementById('photo').value;
    if (ref) {
        fetch('/api/delete-temp-file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_ref: ref })
        });
    }
    if (lostItemPreviewUrl) { URL.revokeObjectURL(lostItemPreviewUrl); lostItemPreviewUrl = null; }
    document.getElementById('photo').value = '';
    document.getElementById('photoCamera').value = '';
    document.getElementById('photoGallery').value = '';
    document.getElementById('photoPreview').src = '';
    document.getElementById('photoPreviewWrapper').classList.add('d-none');
}
</script>
