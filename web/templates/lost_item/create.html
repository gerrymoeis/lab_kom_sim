{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_create.html" . }}
                    <form method="POST" action="/lost-items/create">
                        <div class="mb-3">
                            <label for="item_name" class="form-label">Nama Barang *</label>
                            <input type="text" class="form-control" id="item_name" name="item_name" required placeholder="Misal: Mouse Wireless Logitech, Flashdisk 32GB, ...">
                        </div>

                        <div class="mb-3">
                            <label for="item_description" class="form-label">Deskripsi Barang</label>
                            <textarea class="form-control" id="item_description" name="item_description" rows="3" placeholder="Warna, merk, ciri-ciri khusus, ..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="reported_by" class="form-label">Nama Pelapor *</label>
                            <input type="text" class="form-control" id="reported_by" name="reported_by" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="reported_date" class="form-label">Tanggal Lapor</label>
                                <input type="date" class="form-control" id="reported_date" name="reported_date" data-default-date>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="last_seen_at" class="form-label">Terakhir Terlihat</label>
                                <input type="datetime-local" class="form-control" id="last_seen_at" name="last_seen_at">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="hilang">Hilang</option>
                                <option value="dilaporkan">Dilaporkan</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="location_last_seen" class="form-label">Lokasi Terakhir Dilihat</label>
                            <input type="text" class="form-control" id="location_last_seen" name="location_last_seen" placeholder="Misal: Meja PC-01, di bawah meja PC-07, ...">
                        </div>

                        <hr>
                        <h6 class="text-muted"><i class="bi bi-camera"></i> Foto Barang</h6>

                        <div class="mb-3">
                            <input type="hidden" id="photo" name="photo" value="">
                            <div class="row align-items-center">
                                <div class="col-md-6">
                                    <input type="file" class="form-control" id="photoInput" accept="image/*" capture="environment">
                                    <small class="text-muted">Ambil foto atau pilih dari galeri (JPEG/PNG/HEIC)</small>
                                </div>
                                <div class="col-md-6 text-end">
                                    <img src="/static/img/no-image.png" class="img-thumbnail" style="max-height: 120px; display: none;" id="photoPreview">
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="/lost-items" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

<script>
document.getElementById('photoInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;

    var formData = new FormData();
    formData.append('image', file);
    formData.append('type', 'lost_item');

    fetch('/api/upload-image', { method: 'POST', body: formData })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            document.getElementById('photo').value = data.file_ref;
            var preview = document.getElementById('photoPreview');
            preview.src = data.preview_url;
            preview.style.display = 'inline-block';
        } else {
            alert('Gagal upload foto: ' + data.message);
        }
    })
    .catch(function() { alert('Gagal upload foto'); });
});
</script>

{{ template "layout/footer.html" . }}
