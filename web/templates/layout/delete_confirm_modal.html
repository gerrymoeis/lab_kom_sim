{{ define "layout/delete_confirm_modal.html" }}
<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title">
          <i class="bi bi-exclamation-triangle text-danger me-1"></i> Konfirmasi Hapus
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="deleteConfirmMessage" class="mb-0"></p>
        <div id="deleteConfirmInputSection" class="mt-3 d-none">
          <label id="deleteConfirmLabel" class="form-label small text-muted"></label>
          <input type="text" class="form-control" id="deleteConfirmInput" placeholder="">
          <div id="deleteConfirmError" class="invalid-feedback"></div>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="button" class="btn btn-danger" id="deleteConfirmBtn">
          <i class="bi bi-trash"></i> Hapus
        </button>
      </div>
    </div>
  </div>
</div>
{{ end }}
