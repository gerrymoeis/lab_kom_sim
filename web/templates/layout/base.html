<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="{{ staticURL "vendor/bootstrap/css/bootstrap.min.css" }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ staticURL "vendor/bootstrap-icons/bootstrap-icons.min.css" }}">
    <link rel="stylesheet" href="{{ staticURL "css/style.css" }}">
    <link rel="icon" type="image/svg+xml" href="{{ staticURL "favicon.svg" }}">
    <meta name="csrf-token" content="{{ .csrf_token }}">
    <script>window.BASE_PATH = {{ .basePath | json }};</script>
</head>
<body>
    {{ template "layout/navbar.html" . }}
    <div class="container-fluid my-4">

{{ define "layout/footer.html" }}
    </div>
    {{ template "layout/delete_confirm_modal.html" . }}
    <script src="{{ staticURL "vendor/bootstrap/js/bootstrap.bundle.min.js" }}"></script>
    <script src="{{ staticURL "js/main.js" }}"></script>
    <script>
    function fetchWithCSRF(url, options) {
        if (!options) options = {};
        if (!options.headers) options.headers = {};
        if (!options.headers['X-CSRF-Token']) {
            var token = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
            options.headers['X-CSRF-Token'] = token;
        }
        return fetch(url, options);
    }
    </script>
    <script>
    (function() {
        var token = document.querySelector('meta[name="csrf-token"]');
        if (token) {
            var val = token.getAttribute('content');
            document.querySelectorAll('form[method="POST"]').forEach(function(f) {
                var inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = '_csrf'; inp.value = val;
                f.appendChild(inp);
            });
        }
    })();
    </script>
</body>
</html>
{{ end }}
