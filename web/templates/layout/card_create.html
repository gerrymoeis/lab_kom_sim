{{ define "layout/card_create.html" }}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-plus-circle"></i> {{ .title }}</h5>
            </div>
            <div class="card-body">
                {{ if .error }}<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> {{ .error }}</div>{{ end }}
{{ end }}
