{{ define "components/lab_card.html" }}
<div class="card shadow-sm h-100">
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ .lab.Title }}</h5>
        <p class="text-muted small mb-3">{{ .lab.URLPath }}</p>
        <div class="mt-auto d-flex flex-wrap gap-2">
            <a href="/labs/{{ .lab.URLPath }}" class="btn btn-outline-info btn-sm">
                <i class="bi bi-eye"></i> Detail
            </a>
            <a href="/labs/{{ .lab.URLPath }}/layout" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-grid-3x3"></i> Layout
            </a>
            <a href="/labs/{{ .lab.URLPath }}/seeds" class="btn btn-outline-success btn-sm">
                <i class="bi bi-database"></i> Seeds
            </a>
        </div>
    </div>
</div>
{{ end }}
