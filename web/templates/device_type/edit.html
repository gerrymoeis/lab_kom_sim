{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_edit.html" . }}
                    <form method="POST" action="/device-types/{{ .deviceType.ID }}/edit">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nama Jenis Barang *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ .deviceType.Name }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Kategori *</label>
<select class="form-select" id="category" name="category" required>
    <option value="">Pilih kategori...</option>
    {{ range $cat := dtCategories }}
    <option value="{{ $cat.Value }}" {{ if eq $.deviceType.Category $cat.Value }}selected{{ end }}>{{ $cat.Label }}</option>
    {{ end }}
</select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="item_type" class="form-label">Tipe Item *</label>
                                <select class="form-select" id="item_type" name="item_type" required>
                                    <option value="individual" {{ if eq .deviceType.ItemType "individual" }}selected{{ end }}>Individual (1 unit)</option>
                                    <option value="consumable" {{ if eq .deviceType.ItemType "consumable" }}selected{{ end }}>Consumable (habis pakai)</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="brand" class="form-label">Merk</label>
                                <input type="text" class="form-control" id="brand" name="brand" value="{{ .deviceType.Brand }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="model" class="form-label">Model</label>
                                <input type="text" class="form-control" id="model" name="model" value="{{ .deviceType.Model }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="asset_code_prefix" class="form-label">Prefix Asset Code *</label>
                            <input type="text" class="form-control" id="asset_code_prefix" name="asset_code_prefix" value="{{ .deviceType.AssetCodePrefix }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="item_mode" class="form-label">Mode Penggunaan *</label>
                            <select class="form-select" id="item_mode" name="item_mode" required>
                                <option value="loanable" {{ if .deviceType.IsLoanable }}selected{{ end }}>Dapat Dipinjam</option>
                                <option value="consumable" {{ if .deviceType.IsConsumable }}selected{{ end }}>Barang Habis Pakai</option>
                                <option value="none" {{ if not .deviceType.IsLoanable }}{{ if not .deviceType.IsConsumable }}selected{{ end }}{{ end }}>Tidak Keduanya</option>
                            </select>
                            <small class="text-muted">Tentukan apakah barang dapat dipinjam atau habis pakai</small>
                        </div>

                        <div class="mb-3">
                            <label for="default_location" class="form-label">Lokasi Default</label>
                            <input type="text" class="form-control" id="default_location" name="default_location" value="{{ .deviceType.DefaultLocation }}">
                        </div>

                        <div class="mb-3">
                            <label for="notes_template" class="form-label">Template Catatan</label>
                            <textarea class="form-control" id="notes_template" name="notes_template" rows="3">{{ .deviceType.NotesTemplate }}</textarea>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="/devices?tab=types" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

    {{ template "layout/footer.html" . }}
