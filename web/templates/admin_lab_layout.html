{{ define "admin_lab_layout.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="{{ staticURL "vendor/bootstrap/css/bootstrap.min.css" }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ staticURL "vendor/bootstrap-icons/bootstrap-icons.min.css" }}">
    <link rel="stylesheet" href="{{ staticURL "css/style.css" }}">
    <link rel="icon" type="image/svg+xml" href="{{ staticURL "favicon.svg" }}">
    <meta name="csrf-token" content="{{ .csrf_token }}">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between mb-3">
            <h4><i class="bi bi-grid-3x3"></i> Layout — {{ .lab.Title }}</h4>
            <a href="/admin/labs" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Kembali</a>
        </div>

        {{ template "layout/alert.html" . }}

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="/admin/labs/{{ .lab.URLPath }}/layout">
                    <input type="hidden" name="_csrf" value="{{ .csrf_token }}">

                    <div class="mb-3">
                        <label class="form-label">Cols per Row (pisahkan dengan koma)</label>
                        <input type="text" name="cols_per_row" class="form-control"
                               value="{{ .cols_str }}">
                        <div class="form-text">Contoh: 8,8,8,8,8 (5 baris, 8 kolom per baris)</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <div class="form-check">
                                <input type="checkbox" name="has_gap" class="form-check-input" value="1"
                                    {{ if .layout.HasGap }}checked{{ end }}>
                                <label class="form-check-label">Gunakan gap antar kolom</label>
                            </div>
                        </div>
                        <div class="col">
                            <label class="form-label">Gap Position</label>
                            <input type="number" name="gap_pos" class="form-control"
                                   value="{{ if .layout }}{{ .layout.GapPos }}{{ else }}0{{ end }}">
                        </div>
                    </div>

                    <button class="btn btn-primary"><i class="bi bi-floppy"></i> Simpan</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm mt-3">
            <div class="card-header"><i class="bi bi-eye"></i> Preview Grid</div>
            <div class="card-body">
                <div id="grid-preview" class="d-flex flex-wrap gap-2 min-vh-25 p-3 bg-white border rounded"></div>
            </div>
        </div>
    </div>
    <script src="{{ staticURL "vendor/bootstrap/js/bootstrap.bundle.min.js" }}"></script>
    <script>
    function updatePreview() {
        const colsStr = document.getElementById('cols_per_row').value;
        const hasGap = document.getElementById('has_gap').checked;
        const gapPos = parseInt(document.getElementById('gap_pos').value) || 0;

        const preview = document.getElementById('grid-preview');
        preview.innerHTML = '';

        if (!colsStr.trim()) return;

        const colsPerRow = colsStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0);
        if (colsPerRow.length === 0) return;

        colsPerRow.forEach((cols, rowIdx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'd-flex gap-1 mb-2 align-items-center';

            const label = document.createElement('div');
            label.className = 'me-2 text-muted small text-nowrap';
            label.style.width = '60px';
            label.textContent = 'B' + (rowIdx + 1) + ':';
            rowDiv.appendChild(label);

            for (let c = 1; c <= cols; c++) {
                if (hasGap && c === gapPos) {
                    const gap = document.createElement('div');
                    gap.className = 'grid-gap-preview';
                    gap.title = 'GAP / Walkway';
                    rowDiv.appendChild(gap);
                }
                const cell = document.createElement('div');
                cell.className = 'pc-cell-preview';
                cell.textContent = c;
                cell.title = 'Baris ' + (rowIdx + 1) + ', Kolom ' + c;
                rowDiv.appendChild(cell);
            }
            preview.appendChild(rowDiv);
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const colsInput = document.getElementById('cols_per_row');
        const hasGapInput = document.getElementById('has_gap');
        const gapPosInput = document.getElementById('gap_pos');

        colsInput.addEventListener('input', updatePreview);
        hasGapInput.addEventListener('change', updatePreview);
        gapPosInput.addEventListener('input', updatePreview);

        updatePreview();
    });
    </script>
</body>
</html>
{{ end }}
