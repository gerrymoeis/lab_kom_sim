{{ template "layout/base.html" . }}

<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-6">
            <h2><i class="bi bi-app-indicator"></i> Software Catalog</h2>
            <p class="text-muted">Daftar software yang tersedia</p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="software-table-container" class="table-responsive"></div>
        </div>
    </div>
</div>

<script id="data-software" type="application/json">{{ .dataJSON }}</script>
<script>
initPublicTable({
    containerId: "software-table-container",
    data: JSON.parse(document.getElementById("data-software").textContent),
    columns: [
        { field: "name", label: "Nama Software", sortable: true,
          render: function(v, r) { return '<a href="/software/detail/' + r.id + '.html"><strong>' + v + '</strong></a>'; } },
        { field: "category", label: "Kategori", sortable: true, filterable: true,
          render: function(v) {
              var badge = v === "required" ? "primary" : "secondary";
              var label = v === "required" ? "Required" : "Other";
              return '<span class="badge bg-' + badge + '">' + label + '</span>';
          }},
        { field: "description", label: "Deskripsi", sortable: true },
        { field: "installed_count", label: "PC Terinstall", sortable: true,
          render: function(v, r) { return v + ' / ' + r.total_pcs + ' PC'; } }
    ],
    searchFields: ["name", "description"],
    pageSize: 50
});
</script>

{{ template "layout/footer.html" . }}
