{{ template "layout/header.html" . }}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-clipboard-check"></i> Catat Pemakaian Barang</h5>
                </div>
                <div class="card-body">
                    {{ if .error }}
                    <div class="alert alert-danger">{{ .error }}</div>
                    {{ end }}

                    <form method="POST" action="/device-usages/create">
                        <div class="mb-3">
                            <label for="device_id" class="form-label">Perangkat *</label>
                            <select class="form-select" id="device_id" name="device_id" required {{ if .deviceID }}disabled{{ end }}>
                                <option value="">Pilih perangkat...</option>
                                {{ range .devices }}
                                <option value="{{ .ID }}" {{ if eq $.deviceID (printf "%d" .ID) }}selected{{ end }}>
                                    {{ .AssetCode }} - {{ .Name }} (Tersedia: {{ .QuantityAvailable }})
                                </option>
                                {{ end }}
                            </select>
                            {{ if .deviceID }}
                            <input type="hidden" name="device_id" value="{{ .deviceID }}">
                            {{ end }}
                            <small class="text-muted">Hanya barang habis pakai yang memiliki stok tersedia</small>
                        </div>

                        <div class="mb-3">
                            <label for="user_name" class="form-label">Nama Pengguna *</label>
                            <input type="text" class="form-control" id="user_name" name="user_name" required>
                        </div>

                        <div class="mb-3">
                            <label for="user_type" class="form-label">Kategori Pengguna *</label>
                            <select class="form-select" id="user_type" name="user_type" required>
                                <option value="">Pilih kategori...</option>
                                <option value="mahasiswa">Mahasiswa</option>
                                <option value="dosen">Dosen</option>
                                <option value="staff">Staff</option>
                                <option value="lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="usage_date" class="form-label">Tanggal Pemakaian *</label>
                            <input type="date" class="form-control" id="usage_date" name="usage_date" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="quantity" class="form-label">Jumlah *</label>
                                <input type="number" class="form-control" id="quantity" name="quantity" min="1" value="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="is_available" class="form-label">Masih Ada? *</label>
                                <select class="form-select" id="is_available" name="is_available" required>
                                    <option value="yes" selected>Ada</option>
                                    <option value="no">Habis</option>
                                </select>
                                <small class="text-muted">Pilih "Habis" jika barang benar-benar habis, stok akan dikurangi.</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="purpose" class="form-label">Keperluan</label>
                            <textarea class="form-control" id="purpose" name="purpose" rows="3"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="/devices?tab=usages" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

    <script>
        // Set today as default usage date
        document.getElementById('usage_date').valueAsDate = new Date();
    </script>{{ template "layout/footer.html" . }}
