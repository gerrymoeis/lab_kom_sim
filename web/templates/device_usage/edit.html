{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_edit.html" . }}
                    <div class="alert alert-info">
                        <strong>Perangkat:</strong> {{ .deviceTypeName }} ({{ .label }})
                    </div>

                    <form method="POST" action="{{$.basePath}}/device-usages/{{ .usage.ID }}/edit">
                        <div class="mb-3">
                            <label for="user_name" class="form-label">Nama Pengguna *</label>
                            <input type="text" class="form-control" id="user_name" name="user_name" value="{{ .usage.UserName }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="user_type" class="form-label">Kategori Pengguna *</label>
                            <select class="form-select" id="user_type" name="user_type" required>
                                <option value="mahasiswa" {{ if eq .usage.UserType "mahasiswa" }}selected{{ end }}>Mahasiswa</option>
                                <option value="dosen" {{ if eq .usage.UserType "dosen" }}selected{{ end }}>Dosen</option>
                                <option value="staff" {{ if eq .usage.UserType "staff" }}selected{{ end }}>Staff</option>
                                <option value="lainnya" {{ if eq .usage.UserType "lainnya" }}selected{{ end }}>Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="usage_date" class="form-label">Tanggal Pemakaian *</label>
                            <input type="date" class="form-control" id="usage_date" name="usage_date" value="{{ (.usage.UsageDate).Format "2006-01-02" }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="is_available" class="form-label">Masih Ada? *</label>
                                <select class="form-select" id="is_available" name="is_available" required>
                                    <option value="yes" {{ if eq .usage.IsAvailable "yes" }}selected{{ end }}>Ada</option>
                                    <option value="no" {{ if eq .usage.IsAvailable "no" }}selected{{ end }}>Habis</option>
                                </select>
                                <small class="text-muted">Pilih "Habis" jika barang benar-benar habis, stok akan dikurangi.</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="purpose" class="form-label">Keperluan</label>
                            <textarea class="form-control" id="purpose" name="purpose" rows="3">{{ .usage.Purpose }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="2">{{ .usage.Notes }}</textarea>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="{{$.basePath}}/devices?tab=usages" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

    {{ template "layout/footer.html" . }}
