{{ define "admin_labs.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="{{ staticURL "vendor/bootstrap/css/bootstrap.min.css" }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ staticURL "vendor/bootstrap-icons/bootstrap-icons.min.css" }}">
    <link rel="stylesheet" href="{{ staticURL "css/style.css" }}">
    <link rel="icon" type="image/svg+xml" href="{{ staticURL "favicon.svg" }}">
    <meta name="csrf-token" content="{{ .csrf_token }}">
</head>
<body class="bg-light">
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="bi bi-gear"></i> Admin Panel — Labs</h4>
            <div>
                <a href="/labs/admin/users" class="btn btn-outline-primary btn-sm"><i class="bi bi-people"></i> Users</a>
            </div>
        </div>

        {{ template "layout/alert.html" . }}

        <div class="row">
            {{ range $i, $lab := .labs }}
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ $lab.Title }}</h5>
                        <p class="text-muted small">{{ $lab.URLPath }}</p>
                        <div class="d-flex gap-2">
                            <a href="/labs/{{ $lab.URLPath }}/layout" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-grid-3x3"></i> Layout
                            </a>
                            <a href="/labs/{{ $lab.URLPath }}/seeds" class="btn btn-outline-success btn-sm">
                                <i class="bi bi-database"></i> Seeds
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    </div>
    <script src="{{ staticURL "vendor/bootstrap/js/bootstrap.bundle.min.js" }}"></script>
</body>
</html>
{{ end }}
