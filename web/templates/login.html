{{ define "login.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="{{ staticURL "vendor/bootstrap/css/bootstrap.min.css" }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ staticURL "vendor/bootstrap-icons/bootstrap-icons.min.css" }}">
    <link rel="stylesheet" href="{{ staticURL "css/style.css" }}">
    <link rel="icon" type="image/svg+xml" href="{{ staticURL "favicon.svg" }}">
    <meta name="csrf-token" content="{{ .csrf_token }}">
</head>
<body class="login-page-body">
    <div class="container">
        <div class="login-card">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-pc-display-horizontal text-primary" style="font-size: 3rem;"></i>
                        <h3 class="mt-3">{{ .labTitle }}</h3>
                        <p class="text-muted">Sistem Inventaris Lab</p>
                    </div>

                    {{ template "layout/alert.html" . }}

                    <form method="POST" action="{{$.basePath}}/login" data-validate="true">
                        <input type="hidden" name="_csrf" value="{{ .csrf_token }}">
                        <div class="mb-3">
                            <label for="username" class="form-label required">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" 
                                       class="form-control" 
                                       id="username" 
                                       name="username" 
                                       required 
                                       minlength="3"
                                       maxlength="50"
                                       autofocus
                                       placeholder="Masukkan username">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label required">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" 
                                       class="form-control" 
                                       id="password" 
                                       name="password" 
                                       required
                                       minlength="6"
                                       placeholder="Masukkan password">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>

                    {{if .defaultCredentials}}
                    <div class="mt-4 text-center">
                        <small class="text-muted">
                            <strong>Default Credentials:</strong><br>
                            {{range .defaultCredentials}}
                            {{.LabTitle}}: {{.Username}} / {{.Password}}<br>
                            {{end}}
                        </small>
                    </div>
                    {{end}}
                    <div class="mt-3 text-center pt-3 border-top">
                        <a href="/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Pilih Lab Lain</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ staticURL "vendor/bootstrap/js/bootstrap.bundle.min.js" }}"></script>
    <script src="{{ staticURL "js/main.js" }}"></script>
    <script>
    (function() {
        var token = document.querySelector('meta[name="csrf-token"]');
        if (token) {
            var val = token.getAttribute('content');
            document.querySelectorAll('form[method="POST"]').forEach(function(f) {
                var inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = '_csrf'; inp.value = val;
                f.appendChild(inp);
            });
        }
    })();
    </script>
</body>
</html>
{{ end }}
