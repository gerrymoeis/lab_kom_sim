{{ define "admin_user_permissions.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="{{ staticURL "vendor/bootstrap/css/bootstrap.min.css" }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ staticURL "vendor/bootstrap-icons/bootstrap-icons.min.css" }}">
    <link rel="stylesheet" href="{{ staticURL "css/style.css" }}">
    <link rel="icon" type="image/svg+xml" href="{{ staticURL "favicon.svg" }}">
    <meta name="csrf-token" content="{{ .csrf_token }}">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between mb-3">
            <h4><i class="bi bi-shield"></i> Permissions — {{ .user.Username }}</h4>
            <a href="/admin/users" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Kembali</a>
        </div>

        {{ template "layout/alert.html" . }}

        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST" action="/admin/users/{{ .user.ID }}/permissions">
                    <input type="hidden" name="_csrf" value="{{ .csrf_token }}">

                    {{ range $lab := .labs }}
                    <div class="row mb-2 align-items-center">
                        <div class="col">
                            <div class="form-check">
                                <input type="checkbox" name="labs" class="form-check-input"
                                    value="{{ $lab.URLPath }}" id="perm_{{ $lab.URLPath }}"
                                    {{ if index $.permissions $lab.URLPath }}checked{{ end }}>
                                <label class="form-check-label" for="perm_{{ $lab.URLPath }}">
                                    {{ $lab.Title }}
                                </label>
                            </div>
                        </div>
                        <div class="col-auto">
                            <select name="roles" class="form-select form-select-sm">
                                <option value="admin" selected>Admin Lab</option>
                            </select>
                        </div>
                    </div>
                    {{ end }}

                    <button class="btn btn-primary mt-3"><i class="bi bi-floppy"></i> Simpan</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ staticURL "vendor/bootstrap/js/bootstrap.bundle.min.js" }}"></script>
</body>
</html>
{{ end }}
