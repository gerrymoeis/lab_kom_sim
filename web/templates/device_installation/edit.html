{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_edit.html" . }}
                    <div class="alert alert-info">
                        <strong>Perangkat:</strong> {{ .assetCode }}
                    </div>

                    <form method="POST" action="/installations/{{ .installation.ID }}/edit">
                        <div class="mb-3">
                            <label for="location_installed" class="form-label">Lokasi Instalasi *</label>
                            <input type="text" class="form-control" id="location_installed" name="location_installed" value="{{ .installation.LocationInstalled }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="installation_start_date" class="form-label">Tanggal Mulai</label>
                                <input type="date" class="form-control" id="installation_start_date" name="installation_start_date" 
                                    value="{{ if .installation.InstallationStartDate }}{{ (localTime .installation.InstallationStartDate).Format "2006-01-02" }}{{ end }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="installation_finish_date" class="form-label">Tanggal Selesai</label>
                                <input type="date" class="form-control" id="installation_finish_date" name="installation_finish_date"
                                    value="{{ if .installation.InstallationFinishDate }}{{ (localTime .installation.InstallationFinishDate).Format "2006-01-02" }}{{ end }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ .installation.Notes }}</textarea>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="/installations" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

{{ template "layout/footer.html" . }}
