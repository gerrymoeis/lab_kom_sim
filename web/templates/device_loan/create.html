{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_create.html" . }}
                    <form method="POST" action="/device-loans/create">
                        <div class="mb-3">
                            <label for="device_id" class="form-label">Perangkat *</label>
                            <select class="form-select" id="device_id" name="device_id" required>
                                <option value="">Pilih perangkat...</option>
                                {{ range $d := .devices }}
                                <option value="{{ $d.ID }}" {{ if eq $d.ID $.preselectDeviceID }}selected{{ end }}>{{ $d.AssetCode }}{{ if $d.SerialNumber }} — {{ $d.SerialNumber }}{{ end }} ({{ $d.Condition }})</option>
                                {{ end }}
                            </select>
                            <small class="text-muted">Hanya menampilkan perangkat yang tersedia untuk dipinjam</small>
                        </div>

                        <div class="mb-3">
                            <label for="borrower_name" class="form-label">Nama Peminjam *</label>
                            <input type="text" class="form-control" id="borrower_name" name="borrower_name" required>
                        </div>

                        <div class="mb-3">
                            <label for="borrower_type" class="form-label">Tipe Peminjam *</label>
                            <select class="form-select" id="borrower_type" name="borrower_type" required>
                                <option value="">Pilih tipe...</option>
                                <option value="dosen">Dosen</option>
                                <option value="mahasiswa">Mahasiswa</option>
                                <option value="staff">Staff</option>
                                <option value="lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="loan_date" class="form-label">Tanggal Pinjam *</label>
                                <input type="date" class="form-control" id="loan_date" name="loan_date" required data-default-date>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="return_date" class="form-label">Tanggal Kembali *</label>
                                <input type="date" class="form-control" id="return_date" name="return_date" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="purpose" class="form-label">Keperluan</label>
                            <textarea class="form-control" id="purpose" name="purpose" rows="3"></textarea>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="/devices?tab=loans" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

{{ template "layout/footer.html" . }}
