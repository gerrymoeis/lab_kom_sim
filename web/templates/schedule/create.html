{{ define "schedule/create.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{ template "layout/navbar.html" . }}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Tambah Jadwal</h5>
                </div>
                <div class="card-body">
                    {{ if .error }}
                    <div class="alert alert-danger">{{ .error }}</div>
                    {{ end }}

                    <form method="POST" action="/schedules/create">
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label for="course_name" class="form-label">Mata Kuliah *</label>
                                <input type="text" class="form-control" id="course_name" name="course_name" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="class" class="form-label">Kelas</label>
                                <input type="text" class="form-control" id="class" name="class" placeholder="2024A">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="lecturer" class="form-label">Dosen</label>
                                <input type="text" class="form-control" id="lecturer" name="lecturer">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="day" class="form-label">Hari *</label>
                                <select class="form-select" id="day" name="day" required>
                                    <option value="">Pilih hari</option>
                                    {{ range .days }}
                                    <option value="{{ . }}">{{ . }}</option>
                                    {{ end }}
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="time_start" class="form-label">Jam Mulai *</label>
                                <input type="time" class="form-control" id="time_start" name="time_start" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="time_end" class="form-label">Jam Selesai</label>
                                <input type="time" class="form-control" id="time_end" name="time_end">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button>
                            <a href="/schedules" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Kembali</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
{{ end }}
