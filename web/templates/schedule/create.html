{{ template "layout/header.html" . }}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Tambah Jadwal</h5>
            </div>
            <div class="card-body">
                {{ if .error }}<div class="alert alert-danger">{{ .error }}</div>{{ end }}
                <form method="POST" action="/schedules/create">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="course_name" class="form-label">Mata Kuliah *</label>
                            <input type="text" class="form-control" id="course_name" name="course_name" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="class" class="form-label">Kelas *</label>
                            <input type="text" class="form-control" id="class" name="class" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="lecturer" class="form-label">Dosen *</label>
                            <input type="text" class="form-control" id="lecturer" name="lecturer" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="day" class="form-label">Hari *</label>
                            <select class="form-select" id="day" name="day" required>
                                <option value="">Pilih hari</option>
                                {{ range .days }}<option value="{{ . }}">{{ . }}</option>{{ end }}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="time_start" class="form-label">Jam Mulai *</label>
                            <input type="time" class="form-control" id="time_start" name="time_start" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="time_end" class="form-label">Jam Selesai *</label>
                            <input type="time" class="form-control" id="time_end" name="time_end" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Catatan</label>
                        <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Simpan</button>
                        <a href="/schedules" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{ template "layout/footer.html" . }}
