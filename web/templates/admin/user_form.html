{{ template "layout/admin_base.html" . }}

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST"
            {{ if .user }}
                action="/labs/admin/users/{{ .user.ID }}/edit"
            {{ else }}
                action="/labs/admin/users/create"
            {{ end }}>
            <input type="hidden" name="_csrf" value="{{ .csrf_token }}">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       value="{{ if .user }}{{ .user.Username }}{{ end }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" name="full_name" class="form-control"
                       value="{{ if .user }}{{ .user.FullName }}{{ end }}">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    {{ if .user }}Password Baru (kosongkan jika tidak diubah){{ else }}Password{{ end }}
                </label>
                <div class="input-group">
                    <input type="password" name="new_password" id="admin_new_password" class="form-control"
                           {{ if not .user }}required{{ end }}>
                    <button type="button" class="btn btn-outline-secondary toggle-password" data-target="admin_new_password" tabindex="-1">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            {{ if and $.is_super_admin $.is_protected }}
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_global_admin" class="form-check-input" value="1"
                    id="is_global_admin"
                    {{ if and .user .user.IsGlobalAdmin }}checked{{ end }}>
                <label class="form-check-label" for="is_global_admin">Global Admin Biasa</label>
                <small class="text-muted d-block">Akses semua lab + dapat hapus user biasa di semua lab</small>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_protected" class="form-check-input" value="1"
                    id="is_protected"
                    {{ if and .user .user.IsProtected }}checked{{ end }}>
                <label class="form-check-label" for="is_protected">Protected</label>
                <small class="text-muted d-block">Tidak dapat dihapus/diedit oleh Global Admin Biasa</small>
            </div>
            {{ end }}

            <div id="lab_permissions_section" class="mb-3">
                <label class="form-label">Akses Lab</label>
                {{ range $lab := .labs }}
                <div class="row mb-2 align-items-center">
                    <div class="col">
                        <div class="form-check">
                            <input type="checkbox" name="labs" class="form-check-input lab-check"
                                value="{{ $lab.URLPath }}" id="lab_{{ $lab.URLPath }}"
                                {{ if and $.permissions (index $.permissions $lab.URLPath) }}checked{{ end }}>
                            <label class="form-check-label" for="lab_{{ $lab.URLPath }}">
                                {{ $lab.Title }}
                            </label>
                        </div>
                    </div>
                    <div class="col-auto">
                        <select name="roles" class="form-select form-select-sm">
                            <option value="admin" selected>Admin Lab</option>
                        </select>
                    </div>
                </div>
                {{ end }}
            </div>

            <button class="btn btn-primary">
                <i class="bi bi-floppy"></i>
                {{ if .user }}Simpan Perubahan{{ else }}Buat User{{ end }}
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('is_global_admin')?.addEventListener('change', function() {
        document.getElementById('lab_permissions_section').style.opacity = this.checked ? '0.5' : '1';
        document.querySelectorAll('#lab_permissions_section input[type="checkbox"]').forEach(function(cb) {
            cb.disabled = this.checked;
            if (this.checked) cb.checked = true;
        }, this);
    });
    if (document.getElementById('is_global_admin')?.checked) {
        document.getElementById('lab_permissions_section').style.opacity = '0.5';
        document.querySelectorAll('#lab_permissions_section input[type="checkbox"]').forEach(function(cb) {
            cb.disabled = true;
            cb.checked = true;
        });
    }
</script>

{{ template "layout/admin_footer.html" . }}
