{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_edit.html" . }}
                    <form method="POST" action="{{ $.basePath }}/admin/users/{{ .user.Username }}/edit">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username *</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ .user.Username }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="full_name" class="form-label">Nama Lengkap *</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ .user.FullName }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Role *</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="admin" {{ if eq .user.Role "admin" }}selected{{ end }}>Admin</option>
                                <option value="dosen" {{ if eq .user.Role "dosen" }}selected{{ end }}>Dosen</option>
                            </select>
                        </div>

                        <hr>
                        <h6 class="text-primary mb-3"><i class="bi bi-key"></i> Reset Password</h6>
                        <div class="mb-3">
                            <label for="new_password" class="form-label">Password Baru</label>
                            <input type="password" class="form-control" id="new_password" name="new_password">
                            <small class="text-muted">Kosongkan jika tidak ingin mengubah password</small>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="{{ $.basePath }}/admin/users/{{ .user.Username }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}
</div>

{{ template "layout/footer.html" . }}
