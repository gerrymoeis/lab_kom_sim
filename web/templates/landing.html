{{ define "landing.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="{{ staticURL "vendor/bootstrap/css/bootstrap.min.css" }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ staticURL "vendor/bootstrap-icons/bootstrap-icons.min.css" }}">
    <link rel="stylesheet" href="{{ staticURL "css/style.css" }}">
    <link rel="icon" type="image/svg+xml" href="{{ staticURL "favicon.svg" }}">
</head>
<body class="login-page-body">
    <div class="container">
        <div class="text-center mb-5 pt-5">
            <i class="bi bi-pc-display-horizontal text-primary" style="font-size: 4rem;"></i>
            <h2 class="mt-3">Sistem Inventaris Laboratorium Komputer</h2>
            <p class="text-muted">Pilih laboratorium untuk memulai</p>
        </div>
        <div class="row justify-content-center g-4">
            {{ range $i, $lab := .labs }}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-body d-flex flex-column align-items-center justify-content-center py-5">
                        <i class="bi bi-pc-display-horizontal text-primary" style="font-size: 3rem;"></i>
                        <h5 class="card-title mt-3">{{ $lab.Title }}</h5>
                        <a href="/{{ $lab.Name }}/login" class="btn btn-primary mt-3">
                            <i class="bi bi-box-arrow-in-right"></i> Masuk
                        </a>
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    </div>
    <script src="{{ staticURL "vendor/bootstrap/js/bootstrap.bundle.min.js" }}"></script>
</body>
</html>
{{ end }}
