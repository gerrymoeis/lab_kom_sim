{{ define "pc/layout_modal.html" }}
<div class="modal fade" id="pcLayoutModal" tabindex="-1" aria-labelledby="pcLayoutModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="pcLayoutModalLabel"><i class="bi bi-grid-3x3-gap"></i> Kelola Layout PC</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
      </div>
      <div class="modal-body">
        <div id="layoutModeMessage" class="d-none"></div>
        <div id="layoutSelectedInfo" class="text-primary small mb-2"></div>
        <h6 class="text-muted mb-2"><i class="bi bi-pc-display"></i> PC Mahasiswa</h6>
        <div class="layout-grid-container d-flex justify-content-center">
          <div id="layoutGridBody" style="width:100%"></div>
        </div>

        <div id="layoutActions" class="mt-2"></div>

        <hr>
        <h6 class="text-muted mb-2"><i class="bi bi-box-seam"></i> PC Cadangan</h6>
        <div id="layoutCadanganBody" class="d-flex flex-wrap gap-1"></div>

        <h6 class="text-muted mt-2 mb-2"><i class="bi bi-star"></i> PC Spesial</h6>
        <div id="layoutSpecialBody" class="d-flex flex-wrap gap-1"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>
{{ end }}
