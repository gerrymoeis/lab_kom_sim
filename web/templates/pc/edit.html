{{ define "pc/edit.html" }}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {{ template "layout/navbar.html" . }}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-pencil"></i> Edit PC-{{ printf "%02d" .pc.PCNumber }}</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="/pc/{{ .pc.ID }}/edit">
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> Nomor PC dan posisi tidak dapat diubah. Untuk mengubahnya, hapus dan buat PC baru.
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Nomor PC</label>
                                <input type="text" class="form-control" value="PC-{{ printf "%02d" .pc.PCNumber }}" disabled>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Baris</label>
                                <input type="text" class="form-control" value="{{ .pc.Row }}" disabled>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Kolom</label>
                                <input type="text" class="form-control" value="{{ .pc.Column }}" disabled>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status *</label>
                            <select class="form-select" id="status" name="status" required>
                                <option value="normal" {{ if eq .pc.Status "normal" }}selected{{ end }}>Normal</option>
                                <option value="warning" {{ if eq .pc.Status "warning" }}selected{{ end }}>Warning</option>
                                <option value="broken" {{ if eq .pc.Status "broken" }}selected{{ end }}>Rusak</option>
                                <option value="inactive" {{ if eq .pc.Status "inactive" }}selected{{ end }}>Inactive</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="processor" class="form-label">Processor</label>
                            <input type="text" class="form-control" id="processor" name="processor" value="{{ .pc.Processor }}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ram" class="form-label">RAM</label>
                                <input type="text" class="form-control" id="ram" name="ram" value="{{ .pc.RAM }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="storage" class="form-label">Storage</label>
                                <input type="text" class="form-control" id="storage" name="storage" value="{{ .pc.Storage }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="operating_system" class="form-label">Sistem Operasi</label>
                            <input type="text" class="form-control" id="operating_system" name="operating_system" value="{{ .pc.OperatingSystem }}" placeholder="Contoh: Windows 11 Pro 25H2">
                            <small class="text-muted">Contoh: Windows 11 Pro 25H2, Windows 10 Pro 23H2, Ubuntu 22.04 LTS</small>
                        </div>

                        <div class="mb-3">
                            <label for="purchase_date" class="form-label">Tanggal Pembelian</label>
                            <input type="date" class="form-control" id="purchase_date" name="purchase_date" value="{{ .purchaseDate }}">
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ .pc.Notes }}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="/pc/{{ .pc.ID }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
{{ end }}
