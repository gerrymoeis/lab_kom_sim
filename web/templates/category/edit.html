{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_edit.html" . }}

                    <form method="POST" action="{{$.basePath}}/categories/{{ .category.DefaultPrefix | lower }}/edit">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nama Kategori *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ .category.Name }}" required>
                            <small class="text-muted">TitleCase, contoh: Mouse, CCTV</small>
                        </div>
                        <div class="mb-3">
                            <label for="default_prefix" class="form-label">Default Prefix *</label>
                            <input type="text" class="form-control" id="default_prefix" name="default_prefix" value="{{ .category.DefaultPrefix }}" required>
                            <small class="text-muted">UPPERCASE, contoh: MOUSE, CCTV</small>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="{{$.basePath}}/categories/{{ .category.DefaultPrefix | lower }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
    {{ template "layout/card_close.html" . }}
</div>

{{ template "layout/footer.html" . }}
