{{ template "layout/base.html" . }}

<div class="container-fluid mt-4 px-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> {{ .title }}</h5>
        </div>
        <div class="card-body">
            {{ template "layout/alert.html" . }}

            <!-- Category Section -->
            <div class="mb-4 p-3 border rounded">
                <h5 class="mb-3"><i class="bi bi-folder"></i> Kategori</h5>
                <div class="mb-2">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="catMode" id="catExisting" value="existing" checked>
                        <label class="form-check-label" for="catExisting">Pilih Kategori</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="catMode" id="catNew" value="new">
                        <label class="form-check-label" for="catNew">Buat Kategori Baru</label>
                    </div>
                </div>
                <div id="catExistingSection">
                    <select class="form-select" id="categorySelect">
                        <option value="">Pilih kategori...</option>
                        {{ range $c := .categories }}
                        <option value="{{ $c.ID }}" data-prefix="{{ $c.DefaultPrefix }}">{{ $c.Name }} ({{ $c.DefaultPrefix }})</option>
                        {{ end }}
                    </select>
                </div>
                <div id="catNewSection" style="display:none;">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">Nama Kategori *</label>
                            <input type="text" class="form-control" id="newCatName" placeholder="Contoh: Mouse, CCTV">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Prefix (otomatis)</label>
                            <input type="text" class="form-control" id="newCatPrefix" placeholder="Contoh: MOUSE, CCTV" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Device Type Section -->
            <div class="mb-4 p-3 border rounded">
                <h5 class="mb-3"><i class="bi bi-box"></i> Tipe Perangkat</h5>
                <div class="mb-2">
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="typeMode" id="typeExisting" value="existing" checked>
                        <label class="form-check-label" for="typeExisting">Pilih Tipe</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="typeMode" id="typeNew" value="new">
                        <label class="form-check-label" for="typeNew">Buat Tipe Baru</label>
                    </div>
                </div>
                <div id="typeExistingSection">
                    <select class="form-select" id="typeSelect">
                        <option value="">Pilih kategori terlebih dahulu...</option>
                        {{ range $t := .deviceTypes }}
                        <option value="{{ $t.ID }}" data-category="{{ $t.CategoryID }}" data-prefix="{{ $t.AssetCodePrefix }}" data-usage="{{ $t.UsageType }}" data-default-location="{{ $t.DefaultLocation }}" style="display:none;">
                            {{ $t.Name }} ({{ $t.AssetCodePrefix }})
                        </option>
                        {{ end }}
                    </select>
                </div>
                <div id="typeNewSection" style="display:none;">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label">Nama Varian *</label>
                            <input type="text" class="form-control" id="newTypeName" placeholder="Contoh: Axioo, HIKVISION PTZ">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Brand</label>
                            <input type="text" class="form-control" id="newTypeBrand" placeholder="Contoh: Wacom, HIKVISION">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Model</label>
                            <input type="text" class="form-control" id="newTypeModel" placeholder="Contoh: Intuos S">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Prefix Asset Code (otomatis)</label>
                            <input type="text" class="form-control" id="newTypePrefix" placeholder="Otomatis dari kategori + nama" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tipe Penggunaan *</label>
                            <select class="form-select" id="newTypeUsage">
                                <option value="">Pilih tipe penggunaan...</option>
                                <option value="loanable">Dipinjamkan</option>
                                <option value="consumable">Habis Pakai</option>
                                <option value="installable">Instalasi</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Lokasi Default</label>
                            <input type="text" class="form-control" id="newTypeLocation" placeholder="Contoh: Lab, Lemari Kaca">
                        </div>
                        <div class="col-md-12 mt-3">
                            <label class="form-label fw-medium"><i class="bi bi-camera"></i> Foto Tipe (opsional)</label>
                            <div class="row g-3">
                                <div class="col-6 d-flex flex-column">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="bi bi-camera-fill text-primary me-2"></i>
                                        <label class="form-label mb-0 small fw-medium">Ambil Foto Langsung</label>
                                    </div>
                                    <input type="file" id="newTypePhotoCamera" accept="image/*" capture="environment" class="form-control mt-auto">
                                </div>
                                <div class="col-6 d-flex flex-column">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="bi bi-images text-secondary me-2"></i>
                                        <label class="form-label mb-0 small fw-medium">Pilih dari Galeri</label>
                                    </div>
                                    <input type="file" id="newTypePhotoGallery" accept="image/jpeg,image/png,image/heic,image/heif" class="form-control mt-auto">
                                </div>
                            </div>
                            <div id="newTypePhotoPreview" class="mt-3 d-none">
                                <div class="border rounded-3 p-3 bg-light text-center">
                                    <img id="newTypePhotoPreviewImg" src="" alt="Preview" class="img-fluid rounded" style="max-height: 400px; object-fit: contain;">
                                    <div id="newTypePhotoStatus" class="d-none mt-2 text-danger small"></div>
                                    <div class="mt-3 text-center">
                                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearNewTypePhoto()">
                                            <i class="bi bi-x-circle me-1"></i> Hapus
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Batch Section -->
            <div class="mb-4 p-3 border rounded">
                <h5 class="mb-3"><i class="bi bi-table"></i> Perangkat</h5>
                <div class="row g-2 mb-3 align-items-end">
                    <div class="col-md-3">
                        <label for="batchCount" class="form-label fw-semibold">Jumlah Perangkat</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-hash"></i></span>
                            <input type="number" class="form-control text-center fw-bold" id="batchCount" value="1" min="1" max="100" style="font-size:1.1rem;">
                            <button class="btn btn-outline-primary" type="button" id="generateBtn">
                                <i class="bi bi-table"></i> Generate Tabel
                            </button>
                        </div>
                    </div>
                </div>

                <div id="batchTableContainer" style="display:none;">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle" id="batchTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:50px;">#</th>
                                    <th style="width:200px;">Asset Code (auto)</th>
                                    <th style="width:180px;">Serial Number</th>
                                    <th style="width:140px;">Kondisi</th>
                                    <th style="width:180px;">Lokasi</th>
                                    <th style="width:150px;">Tgl Beli</th>
                                    <th>Catatan</th>
                                </tr>
                            </thead>
                            <tbody id="batchBody"></tbody>
                        </table>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end mt-3">
                        <button class="btn btn-primary" id="saveBatchBtn">
                            <i class="bi bi-save"></i> Simpan Batch
                        </button>
                        <a href="/devices" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Batal
                        </a>
                    </div>
                    <div id="batchError" class="alert alert-danger mt-2" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // --- DOM refs ---
    const catExisting = document.getElementById('catExisting');
    const catNew = document.getElementById('catNew');
    const catExistingSection = document.getElementById('catExistingSection');
    const catNewSection = document.getElementById('catNewSection');
    const categorySelect = document.getElementById('categorySelect');
    const newCatName = document.getElementById('newCatName');
    const newCatPrefix = document.getElementById('newCatPrefix');

    const typeExisting = document.getElementById('typeExisting');
    const typeNew = document.getElementById('typeNew');
    const typeExistingSection = document.getElementById('typeExistingSection');
    const typeNewSection = document.getElementById('typeNewSection');
    const typeSelect = document.getElementById('typeSelect');
    const newTypeName = document.getElementById('newTypeName');
    const newTypeBrand = document.getElementById('newTypeBrand');
    const newTypeModel = document.getElementById('newTypeModel');
    const newTypePrefix = document.getElementById('newTypePrefix');
    const newTypeUsage = document.getElementById('newTypeUsage');
    const newTypeLocation = document.getElementById('newTypeLocation');

    const batchCount = document.getElementById('batchCount');
    const generateBtn = document.getElementById('generateBtn');
    const batchContainer = document.getElementById('batchTableContainer');
    const batchBody = document.getElementById('batchBody');
    const saveBtn = document.getElementById('saveBatchBtn');
    const errorDiv = document.getElementById('batchError');

    // --- Category mode toggle ---
    catExisting.addEventListener('change', function() {
        catExistingSection.style.display = 'block';
        catNewSection.style.display = 'none';
        filterTypes();
    });
    catNew.addEventListener('change', function() {
        catExistingSection.style.display = 'none';
        catNewSection.style.display = 'block';
        filterTypes();
        updateNewTypePrefix();
    });

    // --- Auto prefix for new category ---
    newCatName.addEventListener('input', function() {
        newCatPrefix.value = this.value ? toPrefix(this.value) : '';
    });

    // --- Auto prefix for new type ---
    newTypeName.addEventListener('input', updateNewTypePrefix);

    function getCategoryPrefix() {
        if (catExisting.checked && categorySelect.value) {
            return categorySelect.options[categorySelect.selectedIndex].dataset.prefix;
        }
        if (catNew.checked && newCatPrefix.value) {
            return newCatPrefix.value;
        }
        return '';
    }

    function updateNewTypePrefix() {
        const catPrefix = getCategoryPrefix();
        const name = newTypeName.value;
        if (catPrefix && name) {
            newTypePrefix.value = catPrefix + '-' + toPrefix(name);
        } else if (catPrefix) {
            newTypePrefix.value = catPrefix + '-';
        } else {
            newTypePrefix.value = '';
        }
    }

    function toPrefix(str) {
        return str.toUpperCase().replace(/[^A-Z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
    }

    // --- Filter device types by category ---
    categorySelect.addEventListener('change', filterTypes);
    catExisting.addEventListener('change', filterTypes);
    catNew.addEventListener('change', filterTypes);

    function getCategoryID() {
        if (catExisting.checked) return parseInt(categorySelect.value) || 0;
        return -1; // new category
    }

    function filterTypes() {
        const catID = getCategoryID();
        const options = typeSelect.querySelectorAll('option[data-category]');
        options.forEach(function(opt) {
            if (catID > 0 && parseInt(opt.dataset.category) === catID) {
                opt.style.display = '';
            } else {
                opt.style.display = 'none';
            }
        });
        // reset selection if hidden
        if (typeSelect.selectedIndex > 0) {
            const sel = typeSelect.options[typeSelect.selectedIndex];
            if (sel.style.display === 'none') typeSelect.value = '';
        }
        updateTypePlaceholder();
    }

    function updateTypePlaceholder() {
        const catID = getCategoryID();
        if (catID > 0 || catID === -1) {
            typeSelect.options[0].text = 'Pilih tipe perangkat...';
        } else {
            typeSelect.options[0].text = 'Pilih kategori terlebih dahulu...';
        }
    }

    // --- Device Type mode toggle ---
    typeExisting.addEventListener('change', function() {
        typeExistingSection.style.display = 'block';
        typeNewSection.style.display = 'none';
    });
    typeNew.addEventListener('change', function() {
        typeExistingSection.style.display = 'none';
        typeNewSection.style.display = 'block';
    });

    // --- Get type prefix for batch generation ---
    function getTypePrefix() {
        if (typeExisting.checked && typeSelect.value) {
            return typeSelect.options[typeSelect.selectedIndex].dataset.prefix;
        }
        if (typeNew.checked && newTypePrefix.value) {
            return newTypePrefix.value;
        }
        return '';
    }

    function getDefaultLocation() {
        if (typeExisting.checked && typeSelect.value) {
            return typeSelect.options[typeSelect.selectedIndex].dataset.defaultLocation || '';
        }
        if (typeNew.checked) {
            return newTypeLocation.value || '';
        }
        return '';
    }

    // --- Generate batch table ---
    generateBtn.addEventListener('click', function() {
        const prefix = getTypePrefix();
        if (!prefix) {
            alert('Pilih atau buat tipe perangkat terlebih dahulu');
            return;
        }
        const catID = getCategoryID();
        if (catID === 0) {
            alert('Pilih atau buat kategori terlebih dahulu');
            return;
        }

        const count = parseInt(batchCount.value);
        if (count < 1 || count > 100) { alert('Jumlah harus 1-100'); return; }

        const defaultLoc = getDefaultLocation();

        batchBody.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const code = prefix + '-' + String(i).padStart(3, '0');
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td class="text-center fw-bold">' + i + '</td>' +
                '<td><code class="asset-code">' + code + '</code></td>' +
                '<td><input type="text" class="form-control form-control-sm sn-input" placeholder="Serial Number"></td>' +
                '<td><select class="form-select form-select-sm condition-input"><option value="normal">Normal</option><option value="rusak">Rusak</option><option value="warning">Warning</option></select></td>' +
                '<td><input type="text" class="form-control form-control-sm loc-input" value="' + defaultLoc + '" placeholder="Lokasi"></td>' +
                '<td><input type="date" class="form-control form-control-sm date-input"></td>' +
                '<td><input type="text" class="form-control form-control-sm notes-input" placeholder="Catatan"></td>';
            batchBody.appendChild(tr);
        }

        addApplyAllButtons();
        batchContainer.style.display = 'block';
    });

    function addApplyAllButtons() {
        document.querySelectorAll('.apply-all-btn').forEach(function(el) { el.remove(); });
        const headers = batchBody.closest('table').querySelectorAll('thead th');
        [4, 5, 6].forEach(function(idx) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-outline-secondary btn-sm ms-1 apply-all-btn';
            btn.title = 'Terapkan ke semua baris';
            btn.innerHTML = '⬇';
            btn.dataset.col = idx;
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                applyColumn(parseInt(this.dataset.col));
            });
            headers[idx].appendChild(btn);
        });
    }

    function applyColumn(colIndex) {
        const rows = batchBody.querySelectorAll('tr');
        if (rows.length < 2) return;
        const ci = colIndex - 2; // col 4→input[2], 5→[3], 6→[4]
        let firstVal = '';
        const firstCells = rows[0].querySelectorAll('input, select');
        if (ci >= 0 && ci < firstCells.length) firstVal = firstCells[ci] ? firstCells[ci].value : '';
        if (!firstVal) { alert('Isi baris pertama terlebih dahulu untuk kolom ini'); return; }
        for (let i = 1; i < rows.length; i++) {
            const cells = rows[i].querySelectorAll('input, select');
            if (ci >= 0 && ci < cells.length && cells[ci]) cells[ci].value = firstVal;
        }
    }

    // --- Save batch ---
    saveBtn.addEventListener('click', function() {
        const prefix = getTypePrefix();
        if (!prefix) { alert('Pilih atau buat tipe perangkat'); return; }

        const rows = batchBody.querySelectorAll('tr');
        const devices = [];
        rows.forEach(function(row) {
            devices.push({
                serial_number: row.querySelector('.sn-input') ? row.querySelector('.sn-input').value : '',
                condition: row.querySelector('.condition-input') ? row.querySelector('.condition-input').value : 'normal',
                location: row.querySelector('.loc-input') ? row.querySelector('.loc-input').value : '',
                purchase_date: row.querySelector('.date-input') ? row.querySelector('.date-input').value : '',
                notes: row.querySelector('.notes-input') ? row.querySelector('.notes-input').value : ''
            });
        });

        // Build payload
        var payload = {
            category_id: 0,
            device_type_id: 0,
            devices: devices
        };

        if (catExisting.checked && categorySelect.value) {
            payload.category_id = parseInt(categorySelect.value);
        } else if (catNew.checked && newCatName.value) {
            payload.new_category_name = newCatName.value;
            payload.new_category_prefix = newCatPrefix.value;
        }

        if (typeExisting.checked && typeSelect.value) {
            payload.device_type_id = parseInt(typeSelect.value);
        } else if (typeNew.checked && newTypeName.value) {
            payload.new_type_name = newTypeName.value;
            payload.new_type_brand = newTypeBrand.value;
            payload.new_type_model = newTypeModel.value;
            payload.new_type_asset_code_prefix = newTypePrefix.value;
            payload.new_type_usage_type = newTypeUsage.value;
            payload.new_type_default_location = newTypeLocation.value;
            payload.new_type_photo_file_ref = window.newTypePhotoFileRef || '';
        }

        if (!payload.device_type_id && !payload.new_type_name) {
            alert('Pilih atau buat tipe perangkat');
            return;
        }

        if (typeNew.checked && !payload.new_type_usage_type) {
            alert('Pilih tipe penggunaan untuk varian baru');
            newTypeUsage.focus();
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';
        errorDiv.style.display = 'none';

        fetch('/devices/batch-create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                window.location.href = '/devices';
            } else {
                errorDiv.textContent = data.error || 'Gagal menyimpan batch';
                errorDiv.style.display = 'block';
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="bi bi-save"></i> Simpan Batch';
            }
        })
        .catch(function() {
            errorDiv.textContent = 'Terjadi kesalahan koneksi';
            errorDiv.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="bi bi-save"></i> Simpan Batch';
        });
    });

    // --- Inline type photo upload ---
    var newTypePhotoRef = '';
    ['newTypePhotoCamera','newTypePhotoGallery'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('change', function(e) { handleNewTypePhoto(e.target.files[0], this); });
    });

    async function handleNewTypePhoto(file, input) {
      if (!file || file.size > 5 * 1024 * 1024) { showNewTypeError('Ukuran file maksimal 5MB'); return; }
      showNewTypeLoading();
      if (input.id === 'newTypePhotoCamera') document.getElementById('newTypePhotoGallery').value = '';
      else document.getElementById('newTypePhotoCamera').value = '';
      try {
        var f = file;
        var ext = file.name.split('.').pop().toLowerCase();
        if ((ext === 'heic' || ext === 'heif') && typeof HeicTo !== 'undefined') {
          var b = await HeicTo({ blob: file, type: 'image/jpeg', quality: 0.88 });
          f = new File([b], file.name.replace(/\.(heic|heif)$/i, '.jpg'), { type: 'image/jpeg' });
        }
        if (window.ANDROID_MODE) {
          var img = await createImageBitmap(f);
          var w = img.width, h = img.height, md = 1024;
          if (w > md || h > md) { var r = Math.min(md / w, md / h); w = Math.round(w * r); h = Math.round(h * r); }
          var c = document.createElement('canvas'); c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          var b2 = await new Promise(function(r) { c.toBlob(r, 'image/jpeg', 0.75); });
          f = new File([b2], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' });
        }
        document.getElementById('newTypePhotoPreviewImg').src = URL.createObjectURL(f);
        document.getElementById('newTypePhotoPreview').classList.remove('d-none');
        hideNewTypeError();
        var fd = new FormData(); fd.append('image', f); fd.append('type', 'device_type');
        var j = await(await fetch('/api/upload-image', { method: 'POST', body: fd })).json();
        if (j.success) {
          newTypePhotoRef = j.file_ref;
          window.newTypePhotoFileRef = j.file_ref;
          document.getElementById('newTypePhotoStatus').classList.add('d-none');
        } else showNewTypeError(j.message || 'Gagal upload');
      } catch (e) { showNewTypeError(e.message || 'Gagal memproses gambar'); }
    }

    window.clearNewTypePhoto = function() {
      document.getElementById('newTypePhotoCamera').value = '';
      document.getElementById('newTypePhotoGallery').value = '';
      document.getElementById('newTypePhotoPreview').classList.add('d-none');
      document.getElementById('newTypePhotoPreviewImg').src = '';
      hideNewTypeError();
      if (newTypePhotoRef) {
        fetch('/api/delete-temp-file', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ file_ref: newTypePhotoRef }) }).catch(function(){});
        newTypePhotoRef = '';
        window.newTypePhotoFileRef = '';
      }
    };

    function showNewTypeLoading() {
      document.getElementById('newTypePhotoPreview').classList.remove('d-none');
      document.getElementById('newTypePhotoPreviewImg').style.display = 'none';
      hideNewTypeError();
    }

    function showNewTypeError(msg) {
      var s = document.getElementById('newTypePhotoStatus');
      s.textContent = msg; s.classList.remove('d-none');
    }

    function hideNewTypeError() {
      document.getElementById('newTypePhotoStatus').classList.add('d-none');
      document.getElementById('newTypePhotoPreviewImg').style.display = '';
    }
})();
</script>

<script>window.ANDROID_MODE={{ .android }};</script>
{{ if .android }}<script src="/static/vendor/heic-to.js"></script>{{ end }}

{{ template "layout/footer.html" . }}
