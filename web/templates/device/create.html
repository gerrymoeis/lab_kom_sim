{{ define "content" }}
{{ template "navbar" . }}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Tambah Perangkat Baru</h5>
                </div>
                <div class="card-body">
                    {{ if .error }}
                    <div class="alert alert-danger">{{ .error }}</div>
                    {{ end }}

                    <form method="POST" action="/devices/create">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nama Perangkat *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Kategori *</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">Pilih kategori...</option>
                                <option value="printer">Printer</option>
                                <option value="router">Router</option>
                                <option value="speaker">Speaker</option>
                                <option value="pc_cadangan">PC Cadangan</option>
                                <option value="komputer_labor">Komputer Labor</option>
                                <option value="komputer_dosen">Komputer Dosen</option>
                                <option value="lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="brand" class="form-label">Merk</label>
                                <input type="text" class="form-control" id="brand" name="brand">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="condition" class="form-label">Kondisi *</label>
                                <select class="form-select" id="condition" name="condition" required>
                                    <option value="baik">Baik</option>
                                    <option value="rusak">Rusak</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Lokasi</label>
                            <input type="text" class="form-control" id="location" name="location">
                        </div>

                        <div class="mb-3">
                            <label for="purchase_date" class="form-label">Tanggal Pembelian</label>
                            <input type="date" class="form-control" id="purchase_date" name="purchase_date">
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="/devices" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{{ end }}
