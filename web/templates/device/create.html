{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_create.html" . }}
                    <form method="POST" action="/devices/create">
                        <div class="mb-3">
                            <label for="device_type_id" class="form-label">Tipe Perangkat *</label>
                            <select class="form-select" id="device_type_id" name="device_type_id" required>
                                <option value="">Pilih tipe perangkat...</option>
                                {{ range $dt := .deviceTypes }}
                                <option value="{{ $dt.ID }}" data-prefix="{{ $dt.AssetCodePrefix }}" data-usage="{{ $dt.UsageType }}">
                                    {{ $dt.CategoryName }} — {{ $dt.Name }} ({{ $dt.AssetCodePrefix }})
                                </option>
                                {{ end }}
                            </select>
                            <small class="text-muted">Kategori — Nama Varian (Prefix Asset Code)</small>
                        </div>

                        <div class="mb-3">
                            <label for="serial_number" class="form-label">Serial Number</label>
                            <input type="text" class="form-control" id="serial_number" name="serial_number">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="condition" class="form-label">Kondisi *</label>
                                <select class="form-select" id="condition" name="condition" required>
                                    <option value="baik">Baik</option>
                                    <option value="rusak">Rusak</option>
                                    <option value="maintenance">Maintenance</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="purchase_date" class="form-label">Tanggal Beli</label>
                                <input type="date" class="form-control" id="purchase_date" name="purchase_date">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Lokasi</label>
                            <input type="text" class="form-control" id="location" name="location">
                            <small class="text-muted">Lokasi penyimpanan saat ini</small>
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Simpan
                            </button>
                            <a href="/devices" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

{{ template "layout/footer.html" . }}
