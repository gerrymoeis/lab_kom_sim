{{ template "layout/base.html" . }}

<div class="container mt-4">
    {{ template "layout/card_edit.html" . }}
                    <form method="POST" action="/devices/{{ .device.ID }}/edit">
                        <div class="mb-3">
                            <label for="device_type_id" class="form-label">Tipe Perangkat *</label>
                            <select class="form-select" id="device_type_id" name="device_type_id" required>
                                <option value="">Pilih tipe perangkat...</option>
                                {{ range $dt := .deviceTypes }}
                                <option value="{{ $dt.ID }}" {{ if eq $.device.DeviceTypeID $dt.ID }}selected{{ end }}>
                                    {{ $dt.CategoryName }} — {{ $dt.Name }} ({{ $dt.AssetCodePrefix }})
                                </option>
                                {{ end }}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="asset_code" class="form-label">Asset Code *</label>
                            <input type="text" class="form-control" id="asset_code" name="asset_code" value="{{ .device.AssetCode }}" required>
                            <small class="form-text text-muted">Format: PREFIX-NNN (contoh: MOUSE-AXIOO-001)</small>
                        </div>

                        <div class="mb-3">
                            <label for="serial_number" class="form-label">Serial Number</label>
                            <input type="text" class="form-control" id="serial_number" name="serial_number" value="{{ .device.SerialNumber }}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="condition" class="form-label">Kondisi *</label>
                                <select class="form-select" id="condition" name="condition" required>
                                    <option value="baik" {{ if eq .device.Condition "baik" }}selected{{ end }}>Baik</option>
                                    <option value="rusak" {{ if eq .device.Condition "rusak" }}selected{{ end }}>Rusak</option>
                                    <option value="maintenance" {{ if eq .device.Condition "maintenance" }}selected{{ end }}>Maintenance</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="purchase_date" class="form-label">Tanggal Beli</label>
                                <input type="date" class="form-control" id="purchase_date" name="purchase_date" 
                                    value="{{ if .device.PurchaseDate }}{{ (localTime .device.PurchaseDate).Format "2006-01-02" }}{{ end }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Lokasi</label>
                            <input type="text" class="form-control" id="location" name="location" value="{{ .device.Location }}">
                        </div>

                        <div class="mb-3">
                            <label for="notes" class="form-label">Catatan</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ .device.Notes }}</textarea>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Update
                            </button>
                            <a href="/devices" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Batal
                            </a>
                        </div>
                    </form>
{{ template "layout/card_close.html" . }}

{{ template "layout/footer.html" . }}
