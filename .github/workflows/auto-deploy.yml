name: Auto-Deploy Sync

on:
  push:
    branches: [refactoring]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, android, windows]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Merge refactoring into deploy_${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail

          PLATFORM="${{ matrix.platform }}"
          DEPLOY_BRANCH="deploy_${PLATFORM}"

          echo "=== 1. Switch to ${DEPLOY_BRANCH} ==="
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"

          OLD_HEAD=$(git rev-parse HEAD)

          echo "=== 2. Merge refactoring (theirs for conflicts) ==="
          # Merge mungkin gagal dengan modify/delete conflict untuk files
          # yang dihapus di refactoring tapi masih ada di deploy branch
          # (contoh: deploy-local.sh). Gagal merge akan di-resolve di step 3.
          git merge origin/refactoring -X theirs --no-commit 2>&1 || true

          echo "=== 3. Resolve modify/delete conflict ==="
          # deploy-local.sh sudah dihapus dari refactoring → hapus juga dari deploy branch
          git rm --ignore-unmatch --force scripts/deploy-local.sh 2>/dev/null || true
          # Pastikan tidak ada conflict lain yang gagal diresolve
          if [ -n "$(git ls-files -u)" ]; then
            echo "Fatal: unresolved merge conflicts:"
            git status
            exit 1
          fi

          echo "=== 4. Restore deploy-specific files ==="
          git checkout "${OLD_HEAD}" -- README.md go.mod go.sum
          git checkout "${OLD_HEAD}" -- scripts/
          # deploy-local.sh tidak boleh di-restore — sudah dihapus di refactoring
          git rm --ignore-unmatch scripts/deploy-local.sh 2>/dev/null || true

          echo "=== 5. Force .env.example dari refactoring (3-way merge bisa pilih versi lama karena revert history) ==="
          git checkout origin/refactoring -- .env.example

          echo "=== 6. Cleanup Windows scripts on deploy_linux ==="
          if [ "${PLATFORM}" = "linux" ]; then
            git rm --ignore-unmatch \
              scripts/build-windows.ps1 \
              scripts/deploy-windows.ps1 \
              scripts/download-vendor.ps1
          fi

          echo "=== 7. Resolve dependencies ==="
          if [ "${PLATFORM}" = "linux" ] || [ "${PLATFORM}" = "android" ]; then
            GOFLAGS="-tags=moderncsqlite" go mod tidy
          else
            go mod tidy
          fi

          echo "=== 8. Run tests ==="
          go test ./... -count=1

          echo "=== 9. Stage all changes ==="
          git add -A

          echo "=== 10. Verify build ==="
          BUILD_TAGS=""
          if [ "${PLATFORM}" = "linux" ] || [ "${PLATFORM}" = "android" ]; then
            BUILD_TAGS="-tags moderncsqlite"
          fi
          go build ${BUILD_TAGS} ./...
          go vet ${BUILD_TAGS} ./...

          echo "=== 11. Commit and push ==="
          if ! git diff --cached --quiet; then
            git commit -m "sync: merge refactoring into ${DEPLOY_BRANCH}"
            git push origin "${DEPLOY_BRANCH}"
            echo "✓ ${DEPLOY_BRANCH} synced and pushed"
          else
            echo "· No changes for ${DEPLOY_BRANCH}"
          fi
