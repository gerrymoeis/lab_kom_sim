name: Auto-Deploy Sync

on:
  push:
    branches: [refactoring]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, android, windows]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Merge refactoring into deploy_${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail

          PLATFORM="${{ matrix.platform }}"
          DEPLOY_BRANCH="deploy_${PLATFORM}"

          echo "=== 1. Switch to ${DEPLOY_BRANCH} ==="
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"

          OLD_HEAD=$(git rev-parse HEAD)

          echo "=== 2. Merge refactoring (theirs for conflicts) ==="
          git merge origin/refactoring -X theirs --no-commit

          echo "=== 3. Restore deploy-specific files ==="
          git checkout "${OLD_HEAD}" -- README.md go.mod go.sum
          git checkout "${OLD_HEAD}" -- scripts/

          echo "=== 3b. Force .env.example dari refactoring (3-way merge bisa pilih versi lama karena revert history) ==="
          git checkout origin/refactoring -- .env.example

          echo "=== 4. Cleanup Windows scripts on deploy_linux ==="
          if [ "${PLATFORM}" = "linux" ]; then
            git rm --ignore-unmatch \
              scripts/build-windows.ps1 \
              scripts/deploy-windows.ps1 \
              scripts/download-vendor.ps1
          fi

          echo "=== 5. Fix database driver (modernc vs mattn) ==="
          sed -i 's|_ "github.com/mattn/go-sqlite3"|_ "modernc.org/sqlite"|' internal/database/database.go || true
          sed -i 's|sql.Open("sqlite3"|sql.Open("sqlite"|' internal/database/database.go || true

          echo "=== 6. Resolve dependencies ==="
          go mod tidy

          echo "=== 7. Stage all changes ==="
          git add -A

          echo "=== 8. Verify build ==="
          go build ./...
          go vet ./...

          echo "=== 9. Commit and push ==="
          if ! git diff --cached --quiet; then
            git commit -m "sync: merge refactoring into ${DEPLOY_BRANCH}"
            git push origin "${DEPLOY_BRANCH}"
            echo "✓ ${DEPLOY_BRANCH} synced and pushed"
          else
            echo "· No changes for ${DEPLOY_BRANCH}"
          fi
