name: Auto-Deploy Sync

on:
  push:
    branches: [refactoring]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./... -count=1

  sync:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, android, windows]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Merge refactoring into deploy_${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail

          PLATFORM="${{ matrix.platform }}"
          DEPLOY_BRANCH="deploy_${PLATFORM}"

          echo "=== 1. Switch to ${DEPLOY_BRANCH} ==="
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"

          OLD_HEAD=$(git rev-parse HEAD)

          echo "=== 2. Merge refactoring (theirs for conflicts) ==="
          git merge origin/refactoring -X theirs --no-commit 2>&1 || true

          echo "=== 3. Resolve modify/delete conflict ==="
          git rm --ignore-unmatch --force scripts/deploy-local.sh 2>/dev/null || true
          if [ -n "$(git ls-files -u)" ]; then
            echo "Fatal: unresolved merge conflicts:"
            git status
            exit 1
          fi

          echo "=== 4. Restore deploy-specific files ==="
          git checkout "${OLD_HEAD}" -- README.md go.mod go.sum
          git checkout "${OLD_HEAD}" -- scripts/
          git rm --ignore-unmatch scripts/deploy-local.sh 2>/dev/null || true

          echo "=== 5. Force .env.example dari refactoring ==="
          git checkout origin/refactoring -- .env.example

           echo "=== 6. Cleanup platform-irrelevant scripts ==="
           if [ "${PLATFORM}" = "linux" ]; then
             git rm --ignore-unmatch \
               scripts/build-windows.ps1 \
               scripts/deploy-windows.ps1 \
               scripts/download-vendor.ps1 \
               scripts/setup_firewall.ps1 \
               scripts/build_termux.sh
           elif [ "${PLATFORM}" = "windows" ]; then
             git rm --ignore-unmatch \
               scripts/build_termux.sh \
               scripts/simlab.service \
               scripts/inventaris-lab.service \
               scripts/setup-firewall-linux.sh
           elif [ "${PLATFORM}" = "android" ]; then
             git rm --ignore-unmatch \
               scripts/setup_firewall.ps1 \
               scripts/simlab.service \
               scripts/inventaris-lab.service \
               scripts/setup-firewall-linux.sh
           fi

          echo "=== 7. Resolve dependencies ==="
          go mod tidy

          echo "=== 8. Stage all changes ==="
          git add -A

          echo "=== 9. Verify build ==="
          go build ./...
          go vet ./...

          echo "=== 10. Commit and push ==="
          if ! git diff --cached --quiet; then
            git commit -m "sync: merge refactoring into ${DEPLOY_BRANCH}"
            git push origin "${DEPLOY_BRANCH}"
            echo "✓ ${DEPLOY_BRANCH} synced and pushed"
          else
            echo "· No changes for ${DEPLOY_BRANCH}"
          fi

      - name: Build binary & create release (linux)
        if: matrix.platform == 'linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          echo "=== Build Linux binary ==="
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o app-simlab ./cmd/server/

          echo "=== Prepare archive ==="
          mkdir -p app-simlab-linux/web/static
          cp app-simlab app-simlab-linux/
          cp .env.example app-simlab-linux/
          cp -r web/templates app-simlab-linux/web/
          cp -r web/static/css app-simlab-linux/web/static/
          cp -r web/static/js app-simlab-linux/web/static/
          cp web/static/favicon.svg app-simlab-linux/web/static/ 2>/dev/null || true
          [ -d web/static/vendor ] && cp -r web/static/vendor app-simlab-linux/web/static/

          echo "=== Compress archive ==="
          tar czf app-simlab-linux.tar.gz app-simlab-linux/

          echo "=== Create GitHub Release ==="
          TAG="deploy-linux-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "${TAG}" \
            app-simlab-linux.tar.gz \
            --title "Build deploy_linux — $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --notes "Auto-build from \`deploy_linux\` commit ${{ github.sha }}"

          echo "✅ Release created: ${TAG}"
